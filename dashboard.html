<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Vogue.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="nav-logo" onclick="window.location.href='/'">VOGUE<span>·AI</span></div>
  <div class="nav-links" id="navLinks">
    <a href="/index.html">Home</a>
    <a href="/index.html">My Style</a>
    <a class="active">Analytics</a>
  </div>
  <div class="nav-actions">
    <button class="btn-theme" id="themeToggle" title="Toggle dark mode">🌙</button>
    <button class="nav-toggle" id="navToggle">☰</button>
  </div>
</nav>

<!-- STATE BAR -->
<div class="state-bar" id="stateBar">
  <div class="spinner" id="stateSpinner"></div>
  <span id="stateMsg">Loading…</span>
</div>

<!-- DASHBOARD GRID (populated by JS) -->
<div class="dashboard" id="dashboard"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════════ */
const API_BASE = '/api';

Chart.defaults.color          = 'rgba(232,228,220,.45)';
Chart.defaults.font.family    = "'Syne', sans-serif";
Chart.defaults.font.size      = 11;
Chart.defaults.borderColor    = 'rgba(255,255,255,.06)';

const state = { theme: 'dark' };
const PALETTE = ['#c8a97e','#8a9e8c','#b87d7d','#7d9ab8','#b8a07d',
                 '#9d7db8','#7db8b0','#b8b07d','#a07d9d','#7d8ab8'];

function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeToggle').textContent = state.theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('vf_theme', state.theme);
}

function initTheme() {
  const savedTheme = localStorage.getItem('vf_theme') || 'dark';
  state.theme = savedTheme;
  document.documentElement.setAttribute('data-theme', savedTheme);
  const themeBtn = document.getElementById('themeToggle');
  if (themeBtn) {
    themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    themeBtn.addEventListener('click', toggleTheme);
  }
}

function initNav() {
  const toggle = document.getElementById('navToggle');
  if (toggle) {
    toggle.addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });
  }
}

function getLocalQuizData() {
  try {
    return JSON.parse(localStorage.getItem('vf_results') || 'null');
  } catch (err) {
    return null;
  }
}

function getLocalUser() {
  try {
    return JSON.parse(localStorage.getItem('vf_user') || 'null');
  } catch (err) {
    return null;
  }
}

function mergeQuizData(data) {
  const localQuiz = getLocalQuizData();
  if (localQuiz) {
    data.quiz = localQuiz;
  }
  return data;
}

/* ═══════════════════════════════════════════════════════════════
   LOAD + RENDER
   ═══════════════════════════════════════════════════════════════ */
let activeCharts = [];

async function loadData(userId) {
  showState('loading', 'Fetching your style data…');
  console.log('[DEBUG] loadData called with userId:', userId);
  console.log('[DEBUG] API URL:', `${API_BASE}/analytics/${userId}`);
  try {
    const res = await fetch(`${API_BASE}/analytics/${userId}`);
    console.log('[DEBUG] Response status:', res.status);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const json = await res.json();
    hideState();
    return mergeQuizData(json.data);
  } catch (e) {
    console.error('[DEBUG] Error:', e);
    showState('error', `Error: ${e.message}`);
    return null;
  }
}

function showState(type, msg) {
  const bar = document.getElementById('stateBar');
  bar.className = `state-bar ${type}`;
  document.getElementById('stateMsg').textContent = msg;
  document.getElementById('stateSpinner').style.display = type === 'loading' ? 'block' : 'none';
}
function hideState() {
  document.getElementById('stateBar').style.display = 'none';
}

async function run(data) {
  // Destroy previous charts
  activeCharts.forEach(c => c.destroy());
  activeCharts = [];

  const dash = document.getElementById('dashboard');
  dash.innerHTML = '';

  // Build all sections
  renderStatStrip(data);
  renderArchetype(data);

  renderSection('Preference Analysis');
  renderCategoryPie(data);
  renderColorBar(data);

  renderSection('Behaviour & Activity');
  renderActivityLine(data);
  renderOccasionAffinityChart(data);
  renderOccasionGrid(data);

  // Stagger reveal animations
  requestAnimationFrame(() => {
    const els = dash.querySelectorAll('.stat-card, .chart-card, .archetype-card');
    els.forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 60);
    });
  });
}

/* ═══════════════════════════════════════════════════════════════
   STAT STRIP
   ═══════════════════════════════════════════════════════════════ */
function renderStatStrip(data) {
  const s = data.swipe_stats;
  const strip = el('div', 'stat-strip');

  strip.append(
    statCard('Total Swipes', fmt(s.total_swipes), 'Outfits reviewed', ''),
    statCard('Liked',        fmt(s.likes),         `${s.like_rate_pct}% like rate`, 'like-color'),
    statCard('Passed',       fmt(s.dislikes),       'Not your style',  'dis-color'),
    statCard('Active Days',  fmt(s.active_days),    'Days with swipes', 'acc-color'),
  );
  document.getElementById('dashboard').append(strip);
}

function statCard(label, value, meta, colorClass) {
  const card = el('div', 'stat-card');
  card.innerHTML = `
    <div class="stat-label">${label}</div>
    <div class="stat-value ${colorClass}">${value}</div>
    <div class="stat-meta">${meta}</div>
  `;
  return card;
}

/* ═══════════════════════════════════════════════════════════════
   ARCHETYPE CARD
   ═══════════════════════════════════════════════════════════════ */
function renderArchetype(data) {
  const card = el('div', 'archetype-card col-span');
  const arch  = data.quiz?.computed_archetype || 'Discovering…';
  const scores = data.quiz?.style_scores || {};
  const sorted = Object.entries(scores).sort(([,a],[,b]) => b - a).slice(0,5);
  const descriptions = {
    minimalist: 'Less is more. Clean lines, quiet luxury.',
    casual:     'Effortlessly put-together, every day.',
    romantic:   'Soft silhouettes, feminine details.',
    formal:     'Polished, precise, commanding.',
    bohemian:   'Free-spirited, layered, earthy.',
    classic:    'Timeless pieces that never fade.',
    streetwear: 'Urban edge, cultural currency.',
    sporty:     'Function meets bold aesthetic.',
    edgy:       'Contrast, tension, unapologetic.',
    preppy:     'Refined casual with collegiate roots.',
  };

  card.innerHTML = `
    <div>
      <div class="archetype-label">Style Archetype</div>
      <div class="archetype-name">${arch}<span class="archetype-name-italic">${descriptions[arch] || 'Your unique style signature.'}</span></div>
    </div>
    <div class="style-bar-list">
      ${sorted.map(([style, pct]) => `
        <div class="style-bar-row">
          <div class="style-bar-label">${style}</div>
          <div class="style-bar-track">
            <div class="style-bar-fill" data-pct="${pct}"></div>
          </div>
          <div class="style-bar-pct">${Math.round(pct*100)}%</div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('dashboard').append(card);

  // Animate bars after insert
  setTimeout(() => {
    card.querySelectorAll('.style-bar-fill').forEach(bar => {
      bar.style.transform = `scaleX(${bar.dataset.pct})`;
    });
  }, 300);
}

/* ═══════════════════════════════════════════════════════════════
   SECTION DIVIDER
   ═══════════════════════════════════════════════════════════════ */
function renderSection(label) {
  const rule = el('div', 'section-rule col-span');
  rule.innerHTML = `
    <div class="section-rule-line"></div>
    <div class="section-rule-label">${label}</div>
    <div class="section-rule-line"></div>
  `;
  document.getElementById('dashboard').append(rule);
}

/* ═══════════════════════════════════════════════════════════════
   CHART 1 — CATEGORY PIE
   ═══════════════════════════════════════════════════════════════ */
function renderCategoryPie(data) {
  const card = chartCard('Category Preferences', 'What styles you gravitate to', 'Pie');
  const categories = (data.top_categories || []).slice(0, 8);

  if (!categories.length) { showEmpty(card.querySelector('.chart-wrap')); return addCard(card); }

  const labels = categories.map(c => c.category);
  const values = categories.map(c => c.likes);
  const total  = values.reduce((a,b) => a+b, 0);

  // Left: chart canvas
  const layout = el('div', 'pie-layout');
  layout.style.height = '100%';

  const canvasWrap = el('div', '');
  canvasWrap.style.cssText = 'position:relative;height:220px;';
  const canvas = document.createElement('canvas');
  canvasWrap.append(canvas);

  // Right: custom legend
  const legend = el('div', 'legend-list');
  labels.forEach((lbl, i) => {
    const pct  = total ? Math.round(values[i] / total * 100) : 0;
    const item = el('div', 'legend-item');
    item.innerHTML = `
      <div class="legend-dot" style="background:${PALETTE[i % PALETTE.length]}"></div>
      <span class="legend-name">${lbl}</span>
      <span class="legend-pct">${pct}%</span>
    `;
    legend.append(item);
  });

  layout.append(canvasWrap, legend);
  card.querySelector('.chart-wrap').append(layout);
  addCard(card);

  const chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: PALETTE.slice(0, labels.length),
        borderColor: '#111010',
        borderWidth: 3,
        hoverBorderWidth: 3,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#191817',
          borderColor: 'rgba(255,255,255,.08)',
          borderWidth: 1,
          titleColor: '#e8e4dc',
          bodyColor: 'rgba(232,228,220,.6)',
          padding: 12,
          callbacks: {
            label: ctx => ` ${ctx.parsed} likes  (${Math.round(ctx.parsed/total*100)}%)`,
          },
        },
      },
      animation: { animateRotate: true, duration: 900 },
    }
  });
  activeCharts.push(chart);
}

/* ═══════════════════════════════════════════════════════════════
   CHART 2 — COLOR HORIZONTAL BAR
   ═══════════════════════════════════════════════════════════════ */
const COLOR_HEX = {
  Neutral:'#c8b99a', Blue:'#7d9ab8', Pink:'#d4a0a0', Green:'#8a9e8c',
  Brown:'#a0785a', Black:'#555', Red:'#c46a6a', White:'#d4d0c8',
  Orange:'#d4845a', Purple:'#9d7db8', Yellow:'#d4c060', Grey:'#8a8a8a',
};

function renderColorBar(data) {
  const card = chartCard('Color Preferences', 'Palette affinities from your swipes', 'Bar');
  const colors = (data.color_preferences || []).slice(0, 8);

  if (!colors.length) { showEmpty(card.querySelector('.chart-wrap')); return addCard(card); }

  const canvas = document.createElement('canvas');
  card.querySelector('.chart-wrap').append(canvas);
  addCard(card);

  const labels    = colors.map(c => c.color_family);
  const likeData  = colors.map(c => c.likes);
  const disData   = colors.map(c => c.dislikes);
  const barColors = labels.map(l => COLOR_HEX[l] || '#c8a97e');

  const chart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Liked',
          data: likeData,
          backgroundColor: barColors.map(c => c + 'cc'),
          borderColor: barColors,
          borderWidth: 1.5,
          borderRadius: 6,
          borderSkipped: false,
        },
        {
          label: 'Passed',
          data: disData,
          backgroundColor: 'rgba(196,106,106,.25)',
          borderColor: 'rgba(196,106,106,.55)',
          borderWidth: 1.5,
          borderRadius: 6,
          borderSkipped: false,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      scales: {
        x: {
          stacked: false,
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { color: 'rgba(232,228,220,.35)', stepSize: 1 },
          border: { color: 'transparent' },
        },
        y: {
          grid: { display: false },
          ticks: { color: 'rgba(232,228,220,.5)', font: { size: 11 } },
          border: { color: 'transparent' },
        },
      },
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: {
            color: 'rgba(232,228,220,.4)',
            padding: 16,
            boxWidth: 10,
            boxHeight: 10,
            borderRadius: 3,
            useBorderRadius: true,
            font: { size: 11 },
          }
        },
        tooltip: {
          backgroundColor: '#191817',
          borderColor: 'rgba(255,255,255,.08)',
          borderWidth: 1,
          padding: 12,
          callbacks: {
            title: items => items[0].label,
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.x}`,
          },
        },
      },
      animation: { duration: 900, easing: 'easeOutQuart' },
    }
  });
  activeCharts.push(chart);
}

/* ═══════════════════════════════════════════════════════════════
   CHART 3 — ACTIVITY LINE
   ═══════════════════════════════════════════════════════════════ */
function renderActivityLine(data) {
  const card = chartCard('Swipe Activity', '14-day engagement timeline', 'Line');
  card.className += ' col-span';
  const timeline = (data.activity_timeline || []).slice(-14);

  if (!timeline.length) { showEmpty(card.querySelector('.chart-wrap')); return addCard(card); }

  const canvas = document.createElement('canvas');
  card.querySelector('.chart-wrap').append(canvas);
  addCard(card);

  const labels   = timeline.map(d => {
    const dt = new Date(d.day);
    return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  });
  const swipes   = timeline.map(d => d.swipes   || 0);
  const likes    = timeline.map(d => d.likes    || 0);
  const dislikes = timeline.map(d => d.dislikes || 0);

  const grad = (canvas, color) => {
    const g = canvas.getContext('2d').createLinearGradient(0,0,0,300);
    g.addColorStop(0,  color + '55');
    g.addColorStop(1,  color + '00');
    return g;
  };

  const chart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Total Swipes',
          data: swipes,
          borderColor: '#c8a97e',
          backgroundColor: ctx => grad(ctx.chart.canvas, '#c8a97e'),
          borderWidth: 2,
          tension: .4,
          fill: true,
          pointRadius: 4,
          pointBackgroundColor: '#c8a97e',
          pointBorderColor: '#111010',
          pointBorderWidth: 2,
          pointHoverRadius: 6,
        },
        {
          label: 'Liked',
          data: likes,
          borderColor: '#6ab187',
          backgroundColor: ctx => grad(ctx.chart.canvas, '#6ab187'),
          borderWidth: 1.5,
          tension: .4,
          fill: false,
          pointRadius: 3,
          pointBackgroundColor: '#6ab187',
          pointBorderColor: '#111010',
          pointBorderWidth: 2,
          pointHoverRadius: 5,
          borderDash: [],
        },
        {
          label: 'Passed',
          data: dislikes,
          borderColor: '#c46a6a',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          tension: .4,
          fill: false,
          pointRadius: 3,
          pointBackgroundColor: '#c46a6a',
          pointBorderColor: '#111010',
          pointBorderWidth: 2,
          pointHoverRadius: 5,
          borderDash: [4, 4],
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { color: 'rgba(232,228,220,.38)', maxRotation: 0, font:{size:10} },
          border: { color: 'transparent' },
        },
        y: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { color: 'rgba(232,228,220,.35)', stepSize: 2 },
          border: { color: 'transparent' },
          beginAtZero: true,
        },
      },
      plugins: {
        legend: {
          display: true,
          position: 'top',
          align: 'end',
          labels: {
            color: 'rgba(232,228,220,.4)',
            padding: 20,
            boxWidth: 24,
            boxHeight: 2,
            font: { size: 11 },
          }
        },
        tooltip: {
          backgroundColor: '#191817',
          borderColor: 'rgba(255,255,255,.1)',
          borderWidth: 1,
          padding: 14,
          titleColor: 'rgba(232,228,220,.6)',
          bodyColor: '#e8e4dc',
          bodySpacing: 5,
        },
      },
      animation: { duration: 1000, easing: 'easeOutQuart' },
    }
  });
  activeCharts.push(chart);
}

/* ═══════════════════════════════════════════════════════════════
   OCCASION GRID (non-chart visual)
   ═══════════════════════════════════════════════════════════════ */
function renderOccasionAffinityChart(data) {
  const card = chartCard('Occasion Likes vs Dislikes', 'Swipe performance for each occasion', 'Bar');
  const affinities = (data.occasion_affinity || []).slice(0, 8);

  if (!affinities.length) { showEmpty(card.querySelector('.chart-wrap')); return addCard(card); }

  const canvas = document.createElement('canvas');
  card.querySelector('.chart-wrap').append(canvas);
  addCard(card);

  const labels = affinities.map(o => o.occasion);
  const likeData = affinities.map(o => o.likes);
  const dislikeData = affinities.map(o => o.dislikes);

  const chart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Liked',
          data: likeData,
          backgroundColor: 'rgba(122, 194, 149, 0.9)',
          borderColor: '#7db87a',
          borderWidth: 1,
          borderRadius: 6,
          maxBarThickness: 32,
        },
        {
          label: 'Disliked',
          data: dislikeData,
          backgroundColor: 'rgba(196, 106, 106, 0.85)',
          borderColor: '#c46a6a',
          borderWidth: 1,
          borderRadius: 6,
          maxBarThickness: 32,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'x',
      scales: {
        x: {
          stacked: false,
          grid: { display: false },
          ticks: { color: 'rgba(232,228,220,.38)', font: { size: 11 } },
          border: { color: 'transparent' },
        },
        y: {
          stacked: false,
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { color: 'rgba(232,228,220,.35)', stepSize: 1 },
          border: { color: 'transparent' },
          beginAtZero: true,
        },
      },
      plugins: {
        legend: {
          display: true,
          position: 'top',
          labels: { color: 'rgba(232,228,220,.65)', boxWidth: 12, boxHeight: 12, padding: 14 }
        },
        tooltip: {
          backgroundColor: '#191817',
          borderColor: 'rgba(255,255,255,.1)',
          borderWidth: 1,
          padding: 12,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}`,
          },
        },
      },
      animation: { duration: 900, easing: 'easeOutQuart' },
    }
  });
  activeCharts.push(chart);
}

function renderOccasionGrid(data) {
  const card = chartCard('Occasion Affinity', 'Where you want to look great', '');
  const badge = card.querySelector('.chart-badge');
  if (badge) {
    badge.remove();
  }

  const occasions = (data.occasion_affinity || []).slice(0,6);
  const wrap = card.querySelector('.chart-wrap');
  wrap.style.minHeight = 'auto';

  const grid = el('div', 'occasion-grid');
  const icons = { Casual:'☀️', 'Smart Casual':'✦', Party:'✦', Formal:'♦', Sports:'◈', Travel:'◎' };

  occasions.forEach(o => {
    const tile = el('div', 'occasion-tile');
    tile.innerHTML = `
      <div class="occasion-tile-name">${o.occasion}</div>
      <div class="occasion-tile-val">${o.likes}</div>
      <div class="occasion-tile-sub">${o.like_rate_pct}% liked</div>
    `;
    grid.append(tile);
  });

  wrap.append(grid);
  addCard(card);
}

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function chartCard(title, subtitle, badge) {
  const card = el('div', 'chart-card');
  card.innerHTML = `
    <div class="chart-header">
      <div class="chart-title-block">
        <div class="chart-title">${title}</div>
        <div class="chart-subtitle">${subtitle}</div>
      </div>
      ${badge ? `<div class="chart-badge">${badge}</div>` : ''}
    </div>
    <div class="chart-wrap"></div>
  `;
  return card;
}

function addCard(card) {
  document.getElementById('dashboard').append(card);
}

function showEmpty(wrap) {
  const emp = el('div', 'chart-empty');
  emp.innerHTML = `
    <div class="chart-empty-icon">◌</div>
    <div class="chart-empty-text">No data yet</div>
  `;
  wrap.style.position = 'relative';
  wrap.append(emp);
}

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString();
}

/* ═══════════════════════════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  initTheme();
  initNav();

  const params = new URLSearchParams(window.location.search);
  const queryUserId = params.get('userId');
  const localUser = getLocalUser();
  console.log('[DEBUG] DOMContentLoaded - queryUserId:', queryUserId);
  console.log('[DEBUG] DOMContentLoaded - localUser:', localUser);

  if (queryUserId) {
    console.log('[DEBUG] Using queryUserId:', queryUserId);
    const data = await loadData(queryUserId);
    if (data) {
      run(data);
      return;
    }
    return;
  }

  if (localUser?.id) {
    console.log('[DEBUG] Using localUser.id:', localUser.id);
    const data = await loadData(localUser.id);
    if (data) {
      run(data);
      return;
    }
    return;
  }

  console.log('[DEBUG] No userId found - showing error');
  showState('error', 'No signed-in user found. Open the analytics dashboard from your profile page after login.');
});
